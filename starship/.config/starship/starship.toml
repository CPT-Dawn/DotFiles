"$schema" = 'https://starship.rs/config-schema.json'

# Two-line format: Info on top, clean prompt on the bottom
format = """
[╭─](fg:#7aa2f7) $os$directory$git_branch$git_status$rust$nodejs$c
[╰─](fg:#7aa2f7) $character"""

# Right-aligned info for things that don't need your immediate focus
right_format = "$cmd_duration $time"

# Ensure a fresh line between commands to let the terminal breathe
add_newline = true

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold fg:#7aa2f7"
[os.symbols]
Arch = "🐧"
Windows = "🪟"
Macos = "🍎"
Linux = "🐧"

[directory]
format = "[📂 $path ]($style)"
style = "bold fg:#7aa2f7"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📄 "
"Downloads" = "📥 "
"Pictures" = "🖼️ "
"DotFiles" = "⚙️ "
"Desktop" = "🖥️ "

[git_branch]
format = "[🌿 $branch ]($style)"
style = "bold fg:#9ece6a"

[git_status]
format = "[($all_status$ahead_behind )]($style)"
style = "bold fg:#f7768e"
conflicted = "⚔️ "
ahead = "💨 "
behind = "🐢 "
diverged = "🔀 "
untracked = "🔍 "
modified = "📝 "
staged = "✅ "
renamed = "🏷️ "
deleted = "🗑️ "

[rust]
format = "[🦀 $version ]($style)"
style = "bold fg:#e0af68"

[nodejs]
format = "[📦 $version ]($style)"
style = "bold fg:#9ece6a"

[c]
format = "[⚙️ $version ]($style)"
style = "bold fg:#bb9af7"

[cmd_duration]
format = "[⏳ $duration]($style)"
style = "bold fg:#e0af68"
min_time = 2_000 # Only show if a command takes longer than 2 seconds

[time]
disabled = false
time_format = "%I:%M %p"
format = "[⏰ $time]($style)"
style = "bold fg:#bb9af7"

[character]
success_symbol = "[🚀](bold fg:#9ece6a)"
error_symbol = "[💥](bold fg:#f7768e)"
vimcmd_symbol = "[🛑](bold fg:#e0af68)"
