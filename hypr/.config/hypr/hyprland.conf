################
### MONITORS ###
################

monitor = HDMI-A-1, 1920x1080@165, 0x0, 1

monitor = eDP-1, 2560x1600@240, -1600x0, 1.6

xwayland {
  force_zero_scaling = true
}

workspace = 1, monitor:HDMI-A-1, default:true

workspace = 2, monitor:eDP-1, default:true

#################
### AUTOSTART ###
#################

# exec-once = uwsm app -- waybar
exec-once = uwsm app -- 1password --silent

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

scrolling {
    direction = right                  
    column_width = 0.5                
    fullscreen_on_one_column = false   
    focus_fit_method = 1              
    follow_focus = true    
    # wrap_swapcol = false
}

general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3

    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) rgba(7dcfffee) rgba(7aa2f7ee) 45deg
    col.inactive_border = rgba(24283b00) 

    resize_on_border = false
    allow_tearing = false
    layout = scrolling
}

decoration {
    rounding = 14
    rounding_power = 4 

    active_opacity = 1.0
    inactive_opacity = 0.92 

    shadow {
        enabled = true
        range = 40
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 10             
        passes = 3            
        new_optimizations = true
        ignore_opacity = true  

        noise = 0.0117
        contrast = 1.1       
        brightness = 0.85
        vibrancy = 0.2100    
        vibrancy_darkness = 0.0
    }
}

animations {
    enabled = yes, please :)
    bezier = appleFluid, 0.25, 1, 0.5, 1
    bezier = appleSpring, 0.05, 0.9, 0.1, 1.05
    bezier = quick, 0.15, 0, 0.1, 1
    animation = windowsIn, 1, 4, appleSpring, popin 85%
    animation = windowsOut, 1, 4, appleFluid, popin 85%
    animation = windowsMove, 1, 5, appleSpring
    animation = border, 1, 4, appleFluid
    animation = fade, 1, 3, appleFluid
    animation = workspaces, 1, 4.5, appleFluid, fade
    animation = specialWorkspace, 1, 5, appleSpring, slidevert
    animation = borderangle, 1, 40, linear, loop
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 300
    repeat_rate = 40

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# --- Core Apps ---
bind = $mainMod, 1, exec, ghostty
bind = $mainMod, 3, exec, zen-browser
bind = $mainMod, 2, exec, code
bind = $mainMod, Q, killactive,
bind = $mainMod, W, togglefloating,

# --- Niri-Style Layout Navigation ---
bind = $mainMod, left, layoutmsg, focus l
bind = $mainMod, right, layoutmsg, focus r
bind = $mainMod, up, layoutmsg, focus u
bind = $mainMod, down, layoutmsg, focus d

bind = $mainMod SHIFT, left, layoutmsg, movewindowto l
bind = $mainMod SHIFT, right, layoutmsg, movewindowto r
bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
bind = $mainMod SHIFT, down, layoutmsg, movewindowto d

bind = $mainMod CTRL, left, layoutmsg, swapcol l
bind = $mainMod CTRL, right, layoutmsg, swapcol r

bind = $mainMod, equal, layoutmsg, colresize +0.1
bind = $mainMod, minus, layoutmsg, colresize -0.1

bind = $mainMod, P, layoutmsg, promote
bind = $mainMod, F, layoutmsg, colresize 1.0
bind = $mainMod SHIFT, F, layoutmsg, colresize 0.5

# --- Mouse Scroll for Niri Columns ---
# Hold Super and scroll the mouse wheel to glide left and right across the tape
bind = $mainMod, mouse_down, layoutmsg, focus r
bind = $mainMod, mouse_up, layoutmsg, focus l

# --- Screenshot ---
bind = $mainMod, A, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | wl-copy

# --- Alt + Tab Monitor/Workspace Switching ---
# Instantly jumps your cursor and focus to the other screen
bind = ALT, Tab, focusmonitor, +1

# --- The 2 Strict Workspaces ---
bind = $mainMod, mouse:275, movetoworkspace, 1
bind = $mainMod, mouse:276, movetoworkspace, 2

# --- Scratchpad (Magic) ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- Mouse Window Controls ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Hardware & Media Controls ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
# Fn + F9 (XF86Mail) -> Brightness Down
bindel = , XF86Mail, exec, brightnessctl -e4 -n2 set 5%-

# Fn + F10 (XF86HomePage) -> Brightness Up
bindel = , XF86HomePage, exec, brightnessctl -e4 -n2 set 5%+

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
