# ╔══════════════════════════════════════════════════════════════════════╗
# ║                      Zenith — Config                                 ║
# ╚══════════════════════════════════════════════════════════════════════╝

[bar]
# ─── Geometry ───────────────────────────────────────────────────────────

monitor = "eDP-1"
# Ultra-slim flush macOS style
height = 26

# Flush to all edges
gap_horizontal = 0
gap_top = 0

# Sharp corners for an edge-to-edge strip
border_radius = 0

# Creates a glowing bottom underline (customised in style.css)
border_width = 2

# ─── Animated Border ───────────────────────────────────────────────────

# Faster cycle for a high-energy neon flow
rgb_cycle_seconds = 8.0

# ─── Surface Color ─────────────────────────────────────────────────────

# Deep, dark void background to make the neon pop
background = "rgba(10, 10, 14, 0.85)"


[modules]
clock        = true
system_stats = true
playerctl    = true
todo         = true

clock_format = "%a %H:%M"
