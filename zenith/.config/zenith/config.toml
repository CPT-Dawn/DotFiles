# ╔══════════════════════════════════════════════════════════════════════╗
# ║                        Zenith — Config                               ║
# ╚══════════════════════════════════════════════════════════════════════╝

[bar]
# ─── Display Target ─────────────────────────────────────────────────────
monitor = "eDP-1"

# ─── Geometry ───────────────────────────────────────────────────────────

# Bar height in pixels.
height = 30

# Flush to the edges for a full-width boxy look
gap_horizontal = 0

# Stuck to the top
gap_top = 0

# Sharp corners
border_radius = 0

# This now dictates the thickness of the BOTTOM RGB strip.
border_width = 2

# ─── Animated Border ───────────────────────────────────────────────────

# Faster cycle for a dynamic, flowing horizontal strip
rgb_cycle_seconds = 12.0

# ─── Surface Color ─────────────────────────────────────────────────────

# Darker, flatter matte background to make the bottom neon strip pop.
background = "rgba(15, 15, 20, 0.95)"


[modules]
# ─── Module Toggles ─────────────────────────────────────────────────────
clock        = true
system_stats = true
playerctl    = true
todo         = true

# ─── Clock Format ───────────────────────────────────────────────────────
clock_format = "%a %H:%M"
